<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev-Detective | GitHub Search Client</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['Space Mono', 'monospace'],
                    },
                    colors: {
                        github: {
                            dark: '#141D2F',
                            card: '#1E2A47',
                            primary: '#0079FF',
                            text: '#FFFFFF',
                            textAlt: '#8ba0b2'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Space Mono', monospace; }
        .toggle-checkbox:checked { right: 0; border-color: #0079FF; }
        .toggle-checkbox:checked + .toggle-label { background-color: #0079FF; }
        
        /* Spinner Animation */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border-left-color: #0079FF;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-github-dark text-github-text min-h-screen p-4 sm:p-8 flex justify-center">

    <div class="w-full max-w-4xl">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold tracking-wide">dev-detective</h1>
            
            <!-- Battle Mode Toggle -->
            <div class="flex items-center space-x-3">
                <span class="text-sm font-bold text-github-textAlt uppercase tracking-wider">Battle Mode</span>
                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="battle-toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-600 appearance-none cursor-pointer transition-transform duration-300 ease-in-out z-10"/>
                    <label for="battle-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-600 cursor-pointer"></label>
                </div>
            </div>
        </header>

        <!-- Search Forms Container -->
        <div class="bg-github-card rounded-xl p-2 sm:p-4 shadow-lg mb-6 transition-all duration-300">
            
            <!-- Single Mode Form -->
            <form id="single-form" class="flex flex-col sm:flex-row items-center relative w-full">
                <i class="fa-solid fa-magnifying-glass absolute left-4 sm:left-6 text-github-primary text-xl hidden sm:block"></i>
                <input type="text" id="single-input" placeholder="Search GitHub username..." 
                    class="w-full bg-transparent text-github-text placeholder-github-textAlt p-4 sm:pl-16 outline-none text-sm sm:text-lg rounded-lg">
                <button type="submit" class="w-full sm:w-auto mt-2 sm:mt-0 bg-github-primary hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                    Search
                </button>
            </form>

            <!-- Battle Mode Form (Hidden by default) -->
            <form id="battle-form" class="hidden flex-col md:flex-row items-center gap-4 w-full">
                <div class="relative w-full">
                    <i class="fa-brands fa-github absolute left-4 top-1/2 transform -translate-y-1/2 text-github-textAlt"></i>
                    <input type="text" id="battle-input-1" placeholder="Player 1 username..." required
                        class="w-full bg-github-dark border border-gray-700 text-github-text placeholder-github-textAlt p-3 pl-12 outline-none rounded-lg focus:border-github-primary transition-colors">
                </div>
                <span class="font-bold text-github-primary px-2 font-mono italic text-xl">VS</span>
                <div class="relative w-full">
                    <i class="fa-brands fa-github absolute left-4 top-1/2 transform -translate-y-1/2 text-github-textAlt"></i>
                    <input type="text" id="battle-input-2" placeholder="Player 2 username..." required
                        class="w-full bg-github-dark border border-gray-700 text-github-text placeholder-github-textAlt p-3 pl-12 outline-none rounded-lg focus:border-github-primary transition-colors">
                </div>
                <button type="submit" class="w-full md:w-auto bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-8 rounded-lg transition-colors shadow-[0_0_15px_rgba(220,38,38,0.5)]">
                    BATTLE
                </button>
            </form>
        </div>

        <!-- Output Container -->
        <main id="output-container" class="w-full mt-8">
            <!-- Initial State -->
            <div id="initial-state" class="text-center py-20 text-github-textAlt">
                <i class="fa-brands fa-github text-6xl mb-4 opacity-50"></i>
                <p>Enter a GitHub username to begin the investigation.</p>
            </div>
            
            <!-- Loading State -->
            <div id="loading-state" class="hidden flex-col items-center justify-center py-20">
                <div class="loader mb-4"></div>
                <p class="text-github-textAlt font-bold animate-pulse">Fetching Data from GitHub API...</p>
            </div>

            <!-- Content renders here -->
            <div id="content-canvas" class="hidden w-full"></div>
        </main>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // --- DOM Elements ---
        const battleToggle = document.getElementById('battle-toggle');
        const singleForm = document.getElementById('single-form');
        const battleForm = document.getElementById('battle-form');
        const outputContainer = document.getElementById('content-canvas');
        const loadingState = document.getElementById('loading-state');
        const initialState = document.getElementById('initial-state');

        // --- State ---
        let isBattleMode = false;

        // --- Event Listeners ---
        battleToggle.addEventListener('change', (e) => {
            isBattleMode = e.target.checked;
            if (isBattleMode) {
                singleForm.classList.add('hidden');
                battleForm.classList.remove('hidden');
                battleForm.classList.add('flex');
            } else {
                battleForm.classList.add('hidden');
                battleForm.classList.remove('flex');
                singleForm.classList.remove('hidden');
            }
            resetUI();
        });

        singleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('single-input').value.trim();
            if (!username) return;
            
            showLoading();
            try {
                const data = await fetchGitHubProfile(username);
                renderSingleProfile(data);
            } catch (error) {
                renderError(error.message);
            }
        });

        battleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const user1 = document.getElementById('battle-input-1').value.trim();
            const user2 = document.getElementById('battle-input-2').value.trim();
            if (!user1 || !user2) return;

            showLoading();
            try {
                // Phase 3: Promise.all for concurrent requests
                const [data1, data2] = await Promise.all([
                    fetchGitHubProfile(user1),
                    fetchGitHubProfile(user2)
                ]);
                renderBattleResults(data1, data2);
            } catch (error) {
                renderError(error.message);
            }
        });

        // --- Core Fetch Logic (Phase 1 & 2) ---
        async function fetchGitHubProfile(username) {
            // 1. Fetch Base User Data
            const userRes = await fetch(`https://api.github.com/users/${username}`);
            
            if (userRes.status === 404) {
                throw new Error(`User "${username}" Not Found (404)`);
            }
            if (userRes.status === 403) {
                throw new Error(`API Rate Limit Exceeded. Please try again later. (403)`);
            }
            if (!userRes.ok) {
                throw new Error(`Error fetching ${username}`);
            }
            
            const userData = await userRes.json();

            // 2. Phase 2: Endpoint Chaining - Fetch Repos
            const reposRes = await fetch(`${userData.repos_url}?sort=updated&per_page=100`);
            const reposData = reposRes.ok ? await reposRes.json() : [];

            // Phase 3 Calculation Prep
            const totalStars = reposData.reduce((acc, repo) => acc + repo.stargazers_count, 0);
            
            // Get Top 5 latest repos (already sorted by updated)
            const top5Repos = reposData.slice(0, 5);

            return {
                user: userData,
                repos: top5Repos,
                totalStars: totalStars,
                totalReposCount: reposData.length
            };
        }

        // --- Utility Functions ---
        // Format Date: 2023-01-25T12:00:00Z -> 25 Jan 2023
        const formatDate = (isoString) => {
            if (!isoString) return 'Not Available';
            const date = new Date(isoString);
            const options = { day: 'numeric', month: 'short', year: 'numeric' };
            return date.toLocaleDateString('en-GB', options);
        };

        const showLoading = () => {
            initialState.classList.add('hidden');
            outputContainer.classList.add('hidden');
            outputContainer.innerHTML = '';
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');
        };

        const resetUI = () => {
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
            outputContainer.classList.add('hidden');
            outputContainer.innerHTML = '';
            initialState.classList.remove('hidden');
        };

        // --- UI Rendering ---
        
        // Render Error State
        const renderError = (message) => {
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
            outputContainer.classList.remove('hidden');
            
            outputContainer.innerHTML = `
                <div class="bg-red-500/10 border border-red-500 text-red-500 rounded-xl p-8 text-center flex flex-col items-center">
                    <i class="fa-solid fa-triangle-exclamation text-5xl mb-4"></i>
                    <h2 class="text-2xl font-bold mb-2">Investigation Failed</h2>
                    <p>${message}</p>
                </div>
            `;
        };

        // Component: Profile Card Builder
        const createProfileHTML = (data, isBattle = false, resultStatus = null) => {
            const { user, repos, totalStars } = data;
            
            // Conditional styling for battle mode
            let borderClass = 'border-transparent';
            let badgeHTML = '';
            
            if (isBattle) {
                if (resultStatus === 'winner') {
                    borderClass = 'border-green-500 shadow-[0_0_20px_rgba(34,197,94,0.3)]';
                    badgeHTML = `<div class="absolute -top-4 -right-4 bg-green-500 text-white font-bold py-1 px-4 rounded-full transform rotate-12 shadow-lg"><i class="fa-solid fa-crown mr-2"></i>WINNER</div>`;
                } else if (resultStatus === 'loser') {
                    borderClass = 'border-red-500 opacity-80 grayscale-[20%]';
                    badgeHTML = `<div class="absolute -top-4 -right-4 bg-red-500 text-white font-bold py-1 px-4 rounded-full transform rotate-12 shadow-lg"><i class="fa-solid fa-skull mr-2"></i>LOSER</div>`;
                } else if (resultStatus === 'tie') {
                    borderClass = 'border-yellow-500';
                    badgeHTML = `<div class="absolute -top-4 -right-4 bg-yellow-500 text-white font-bold py-1 px-4 rounded-full shadow-lg">TIE</div>`;
                }
            }

            const reposHTML = repos.length > 0 
                ? repos.map(repo => `
                    <a href="${repo.html_url}" target="_blank" class="block bg-github-dark hover:bg-gray-700 p-3 rounded-lg mb-2 transition-colors border border-gray-700 hover:border-github-primary group">
                        <div class="flex justify-between items-center">
                            <span class="text-github-primary font-bold truncate group-hover:underline">${repo.name}</span>
                            <span class="text-xs text-github-textAlt flex items-center bg-gray-800 px-2 py-1 rounded-full"><i class="fa-solid fa-star text-yellow-500 mr-1"></i> ${repo.stargazers_count}</span>
                        </div>
                        ${repo.description ? `<p class="text-xs text-github-textAlt mt-2 truncate">${repo.description}</p>` : ''}
                    </a>
                `).join('')
                : '<p class="text-github-textAlt text-sm italic">No public repositories available.</p>';

            return `
                <div class="bg-github-card p-6 rounded-xl shadow-lg relative border-2 ${borderClass} h-full flex flex-col">
                    ${badgeHTML}
                    
                    <!-- Header: Avatar & Basic Info -->
                    <div class="flex items-center gap-6 mb-6">
                        <img src="${user.avatar_url}" alt="${user.login}" class="w-24 h-24 rounded-full border-4 border-github-dark shadow-md">
                        <div class="flex-1">
                            <h2 class="text-2xl font-bold">${user.name || user.login}</h2>
                            <a href="${user.html_url}" target="_blank" class="text-github-primary hover:underline">@${user.login}</a>
                            <p class="text-sm text-github-textAlt mt-1">Joined ${formatDate(user.created_at)}</p>
                        </div>
                    </div>

                    <!-- Bio -->
                    <p class="text-github-text mb-6 ${!user.bio ? 'italic text-github-textAlt' : ''}">
                        ${user.bio || 'This profile has no bio.'}
                    </p>

                    <!-- Stats (Followers, Following, Total Stars) -->
                    <div class="bg-github-dark rounded-xl p-4 flex justify-between text-center mb-6">
                        <div>
                            <h4 class="text-xs text-github-textAlt mb-1">Repos</h4>
                            <p class="font-bold text-xl">${user.public_repos}</p>
                        </div>
                        <div>
                            <h4 class="text-xs text-github-textAlt mb-1">Followers</h4>
                            <p class="font-bold text-xl">${user.followers}</p>
                        </div>
                        <div>
                            <h4 class="text-xs text-github-textAlt mb-1">Total Stars</h4>
                            <p class="font-bold text-xl text-yellow-400">${totalStars}</p>
                        </div>
                    </div>

                    <!-- Links -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6 text-sm text-github-text">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-location-dot text-github-textAlt w-4"></i>
                            <span class="${!user.location ? 'text-github-textAlt' : ''}">${user.location || 'Not Available'}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-link text-github-textAlt w-4"></i>
                            ${user.blog 
                                ? `<a href="${user.blog.startsWith('http') ? user.blog : 'https://'+user.blog}" target="_blank" class="hover:text-github-primary hover:underline truncate">${user.blog}</a>`
                                : `<span class="text-github-textAlt">Not Available</span>`
                            }
                        </div>
                    </div>

                    <!-- Top 5 Repositories -->
                    <div class="mt-auto pt-4 border-t border-gray-700">
                        <h3 class="text-lg font-bold mb-4 flex items-center"><i class="fa-solid fa-layer-group mr-2 text-github-textAlt"></i> Top Latest Repositories</h3>
                        <div class="space-y-2">
                            ${reposHTML}
                        </div>
                    </div>
                </div>
            `;
        };

        // Render Single Profile
        const renderSingleProfile = (data) => {
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
            outputContainer.classList.remove('hidden');
            outputContainer.innerHTML = createProfileHTML(data);
        };

        // Render Battle Results
        const renderBattleResults = (data1, data2) => {
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
            outputContainer.classList.remove('hidden');

            let status1, status2;

            // Determine Winner based on Total Stars
            if (data1.totalStars > data2.totalStars) {
                status1 = 'winner';
                status2 = 'loser';
            } else if (data2.totalStars > data1.totalStars) {
                status1 = 'loser';
                status2 = 'winner';
            } else {
                status1 = 'tie';
                status2 = 'tie';
            }

            outputContainer.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 w-full">
                    ${createProfileHTML(data1, true, status1)}
                    ${createProfileHTML(data2, true, status2)}
                </div>
            `;
        };
    </script>
</body>
</html>
